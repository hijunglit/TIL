<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/reviews.css">
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.8.2/css/all.min.css"
    />
</head>

<body>
    <main>
        <section class="container">
            <div class="dark_mode_switch">
                <p class="switch_btn moon"><i class="far fa-moon"></i></p>
                <p class="switch_btn sun hide"><i class="far fa-sun"></i></p>
                <input type="checkbox">
            </div>
            <div class="title">
                <h1>Our Reviews</h1>
                <div class="under_line"></div>
            </div>

            <div class="reviews_container">
                <div class="reviews_content">
                    <div class="profile_img">

                    </div>
                    <h5 class="user_name"></h5>
                    <p class="position"></p>
                    <p class="about_review"></p>
                    <div class="pager_container">
                        <button class="pager prev"><i class="fas fa-chevron-left"></i></button>
                        <button class="pager next"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="random_reviews_container">
                        <button class="random_reviews">Surprise Me</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="./js/reviews.js"></script>
</body>
</html>
