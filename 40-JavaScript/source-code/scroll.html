<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Scroll</title>
    <link rel="stylesheet" href="./css/scroll.css">
    <!-- font awesome -->
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.8.2/css/all.min.css"
  />
</head>
<body>

    <header id="header">
        <div class="top">
            <div class="top-wrapper">
                <div class="layout-container">
                    <div class="logo">
                        <img src="https://vannilla-js-basic-project-10-scroll.netlify.app/logo.svg" alt="logo">
                    </div>
                    <div class="mobile-menu-icon">
                        <i class="fas fa-bars"></i>
                    </div>
                </div>
                <nav id="nav">
                    <ul>
                        <li class="menu-list">home</li>
                        <li class="menu-list">about</li>
                        <li class="menu-list">services</li>
                        <li class="menu-list">tours</li>
                    </ul>
                </nav>
            </div>
        </div>
        <div class="banner">
            <div class="banner-wrapper">
                <h1>scroll project</h1>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
                <button class="move-button">explore tours</button>
            </div>
        </div>
    </header>
    
    <section class="main-contents">
        <section class="about-us contents">
            <h1>about <span>us</span></h1>
        </section>

        <section class="service contents">
            <h1>our <span>services</span></h1>
        </section>

        <section class="featured contents">
            <h1>featured <span>tours</span></h1>
        </section>
    </section>

    <footer id="footer">
        <p class="copy-right">Copyright © Backroads Travel Tours Company 2023. All Rights Reserved</p>
    </footer>


    <script src="./js/scroll.js"></script>
</body>
</html>
