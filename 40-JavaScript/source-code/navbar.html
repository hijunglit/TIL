<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive navbar</title>
    <link rel="stylesheet" href="./css/navbar.css">
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.8.2/css/all.min.css"
    />
</head>
<body>
    <header id="header">
        <div class="container">
            <div class="logo navbarHeader">
                <img src = "https://vanilla-js-basic-project-4-navbar.netlify.app/logo.svg">
                <button class="toggleMenu"><i class="fas fa-bars"></i></button>
            </div>
            <nav class="nav closeMenu">
                <ul class="navList">
                    <li><a href="#"> Home</a></li>
                    <li><a href="#"> About</a></li>
                    <li><a href="#"> Projects</a></li>
                    <li><a href="#"> Contact</a></li>
                </ul>
            </nav>
            <ul class="socialIcon">
                <li><a href="https://www.facebook.com" target="_blank"><i class="fab fa-facebook"></i></a></li>
                <li><a href="https://www.twitter.com" target="_blank"><i class="fab fa-twitter"></i></a></li>
                <li><a href="https://www.behance.com" target="_blank"><i class="fab fa-behance"></i></a></li>
                <li><a href="https://www.linkedin.com" target="_blank"><i class="fab fa-linkedin"></i></a></li>
                <li><a href="https://www.sketch.com" target="_blank"><i class="fab fa-sketch"></i></a></li>
            </ul>
        </div>
    </header>
    <script src="./js/navbar.js"></script>
</body>
</html>
