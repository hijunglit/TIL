<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        html,body {
            background: #F1f5f8;
            width: 100%; height: 100vh;
            margin: 0; padding: 0;
        }
        div {
            position: relative;
            top: 50%; transform: translateY(-50%);
            text-align: center;
            width: 80%;
            margin: 0 auto;
        }
        .color-info {
            padding: 1rem 1rem;
            border-radius: 10px;
            margin: 0 auto;
            background: #000;
            color: #fff;
            font-size: 2.6rem;
            letter-spacing: 3px;
        }
        .color-value {
            color: #49A6E9;
        }
        .click {
            background: transparent;
            text-align: center;
            color: #000;
            text-transform: uppercase;
            padding: 1rem 2rem;
            border-radius: 10px;
            margin: 0 auto;
            transition: all 0.4s;
            font-weight: bold;
        }
        .click:hover {
            background: #000; 
            color: #fff;
        }
    </style>
</head>
<body>
    <div>
        <h2 class="color-info"> Background Color : <span class="color-value">#F1f5f8</span></h2>
        <button class="click" style="margin-top: 3rem;">CLICK ME</button>
    </div>

    <script src="/js/index.js"></script>
</body>
</html>
